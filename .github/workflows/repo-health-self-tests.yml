name: Repo Health Self Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-health-self-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run repository-health self-tests
        shell: pwsh
        run: |
          ./tests/Invoke-RepoHealthSelfTests.ps1
